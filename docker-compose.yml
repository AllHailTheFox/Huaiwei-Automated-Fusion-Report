version: '3.8'

services:
  fusionsolar-extractor:
    build: .
    container_name: fusionsolar-extractor
    environment:
      FUSIONSOLAR_USERNAME: ${FUSIONSOLAR_USERNAME}
      FUSIONSOLAR_PASSWORD: ${FUSIONSOLAR_PASSWORD}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      RECIPIENT_EMAILS: ${RECIPIENT_EMAILS}
      STATION_ID: ${STATION_ID:-72289258}
      # Day of month the bill resets (default: 15)
      BILLING_DAY: ${BILLING_DAY:-15}
      # Leave blank for auto-scheduling; set to PRE_BILLING, MID_CYCLE, or TEST to force-send
      FORCE_ALERT: ${FORCE_ALERT:-}
      # TEST mode: optionally set a custom start date (YYYY-MM-DD)
      TEST_START_DATE: ${TEST_START_DATE:-}
      OUTPUT_DIR: /data
    volumes:
      - solar_data:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  solar_data:
    driver: local
