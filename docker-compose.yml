version: '3.8'

services:
  fusionsolar-extractor:
    build: .
    container_name: fusionsolar-extractor
    environment:
      FUSIONSOLAR_USERNAME: ${FUSIONSOLAR_USERNAME}
      FUSIONSOLAR_PASSWORD: ${FUSIONSOLAR_PASSWORD}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      RECIPIENT_EMAILS: ${RECIPIENT_EMAILS}
      STATION_ID: ${STATION_ID:-72289258}
      # Day of month the bill resets (default: 15)
      BILLING_DAY: ${BILLING_DAY:-15}
      # Cron schedule (default: every Friday at 8 AM). Standard 5-field cron syntax.
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 8 * * 5}
      # Set to "true" to fire one report immediately when the container starts
      # (useful for testing). Remember to flip back to "false" afterwards.
      RUN_ON_START: ${RUN_ON_START:-false}
      OUTPUT_DIR: /data
    volumes:
      - solar_data:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  solar_data:
    driver: local
