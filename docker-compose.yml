version: '3.8'

services:
  fusionsolar-extractor:
    build: .
    container_name: fusionsolar-extractor
    environment:
      FUSIONSOLAR_USERNAME: ${FUSIONSOLAR_USERNAME}
      FUSIONSOLAR_PASSWORD: ${FUSIONSOLAR_PASSWORD}
      FUSIONSOLAR_BASE_URL: ${FUSIONSOLAR_BASE_URL:-https://intl.fusionsolar.huawei.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      RECIPIENT_EMAILS: ${RECIPIENT_EMAILS}
      SITE_ID: ${SITE_ID:-72289258}
      BILLING_DAY: ${BILLING_DAY:-15}
      HEAT_LOSS_PERCENT: ${HEAT_LOSS_PERCENT:-5}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 8 * * 5}
      RUN_ON_START: ${RUN_ON_START:-false}
      OUTPUT_DIR: /data
    volumes:
      - solar_data:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  solar_data:
    driver: local
